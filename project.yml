name: DocNest
options:
  bundleIdPrefix: com.kaps
  deploymentTarget:
    macOS: "14.0"
settings:
  base:
    ARCHS: arm64
    SWIFT_VERSION: "5.10"
    GENERATE_INFOPLIST_FILE: YES
    PRODUCT_NAME: $(TARGET_NAME)
    MARKETING_VERSION: 2026.6.1
    CURRENT_PROJECT_VERSION: 1
    CODE_SIGN_STYLE: Manual
    CODE_SIGN_IDENTITY: "-"
    DEVELOPMENT_TEAM: ""
    ENABLE_HARDENED_RUNTIME: YES
  configs:
    Release:
      COPY_PHASE_STRIP: YES
      DEAD_CODE_STRIPPING: YES
      STRIP_INSTALLED_PRODUCT: YES
      LLVM_LTO: YES
targets:
  DocNest:
    type: application
    platform: macOS
    sources:
      - path: DocNest
    settings:
      base:
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        INFOPLIST_FILE: DocNest/Info.plist
        PRODUCT_BUNDLE_IDENTIFIER: com.kaps.docnest
        INFOPLIST_KEY_CFBundleDisplayName: DocNest
        INFOPLIST_KEY_LSApplicationCategoryType: public.app-category.productivity
        INFOPLIST_KEY_NSHumanReadableCopyright: ""
        INFOPLIST_KEY_NSPrincipalClass: NSApplication
        SWIFT_EMIT_LOC_STRINGS: YES
    scheme:
      testTargets:
        - DocNestTests
        - DocNestUITests
      gatherCoverageData: false
  DocNestTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - path: DocNestTests
        excludes:
          - README.md
    dependencies:
      - target: DocNest
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.kaps.docnest.tests
        GENERATE_INFOPLIST_FILE: YES
  DocNestUITests:
    type: bundle.ui-testing
    platform: macOS
    sources:
      - path: DocNestUITests
        excludes:
          - README.md
    dependencies:
      - target: DocNest
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.kaps.docnest.uitests
        GENERATE_INFOPLIST_FILE: YES
        TEST_TARGET_NAME: DocNest
        CODE_SIGN_INJECT_BASE_ENTITLEMENTS: NO
        ENABLE_HARDENED_RUNTIME: NO
