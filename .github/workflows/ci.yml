name: CI

on:
  pull_request:
  push:
    branches: [main, master]

jobs:
  build-and-test:
    name: Build & Test
    runs-on: macos-15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_16.app/Contents/Developer

      - name: Build
        run: |
          xcodebuild \
            -project DocNest.xcodeproj \
            -scheme DocNest \
            -configuration Debug \
            -destination 'platform=macOS' \
            build \
            CODE_SIGN_IDENTITY="-" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO

      - name: Run Unit Tests
        run: |
          xcodebuild \
            -project DocNest.xcodeproj \
            -scheme DocNest \
            -configuration Debug \
            -destination 'platform=macOS' \
            -only-testing:DocNestTests \
            -resultBundlePath "$RUNNER_TEMP/TestResults.xcresult" \
            test \
            CODE_SIGN_IDENTITY="-" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO

      - name: Upload test results
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: TestResults
          path: ${{ runner.temp }}/TestResults.xcresult
          retention-days: 7
